# HOCON format: like JSON but with comments, no quotes needed for simple values.

play.http.secret.key = "dev-secret-replace-in-production"

# "default" is the name of the DB connection pool. You can have multiple (e.g. db.reporting.*).
db.default.driver   = org.postgresql.Driver
db.default.url      = "jdbc:postgresql://localhost:5432/parcel_tracker"
db.default.username = parcel_user
db.default.password = parcel_pass

# autoApply: run pending evolutions on startup without prompting. Fine for dev.
play.evolutions.db.default.autoApply = true

# CSRF protection is for browser form submissions. REST APIs use token auth instead, so disable it.
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# Pub/Sub config. In a real GCP deployment you'd remove emulatorHost and provide
# application credentials instead. The project/topic names can stay the same.
pubsub {
  project      = "local-project"          # must match --project in the emulator command
  topic        = "parcel-status-changed"
  subscription = "parcel-events-cassandra" # Phase 3 consumer pulls from this subscription
  emulatorHost = "localhost:8085"
}

cassandra {
  host       = "localhost"
  port       = 9042
  datacenter = "datacenter1"  # default datacenter name for a single-node Cassandra
  keyspace   = "parcel_tracker"
}
