version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: parcel_tracker
      POSTGRES_USER: parcel_user
      POSTGRES_PASSWORD: parcel_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Google Pub/Sub emulator — same wire protocol as real GCP, no account needed.
  # The app connects to localhost:8085; topics and subscriptions live only in memory.
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    platform: linux/amd64  # image has no arm64 build; runs under QEMU emulation on Apple Silicon
    command: gcloud beta emulators pubsub start --project=local-project --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  # Cassandra — takes 60-90s to be ready on first start.
  # Watch `docker compose ps` until cassandra shows "healthy" before hitting the events endpoint.
  cassandra:
    image: cassandra:4
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M   # keep memory footprint reasonable on a dev machine
      HEAP_NEWSIZE: 100M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Graphite — receives metrics over TCP on port 2003 (Carbon plaintext protocol).
  # Web UI on port 8080 lets you browse raw metric series.
  graphite:
    image: graphiteapp/graphite-statsd
    ports:
      - "2003:2003"  # Carbon plaintext receiver — the app writes here
      - "8080:80"    # Graphite web UI

  # Grafana — dashboard UI that queries Graphite as a data source.
  # Login: admin / admin  →  http://localhost:3000
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - graphite

volumes:
  pgdata:
